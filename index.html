<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Accesso Cinema</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    .box {
      border: 2px solid #2ecc71;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 20px #2ecc71;
    }

    .check {
      font-size: 80px;
      color: #2ecc71;
    }

    h1 {
      margin-top: 10px;
      font-size: 28px;
    }

    p {
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div class="box">
  <div class="check">✔</div>
  <h1>ACCESSO CONSENTITO</h1>
  <p>Buon film 🎬</p>
</div>

<audio id="beep" autoplay>
  <source src="https://www.soundjay.com/buttons/sounds/beep-07.mp3" type="audio/mpeg">
</audio>

<script>
  // Forza il suono anche su telefoni un po’ "rigidi"
  document.body.addEventListener('click', function () {
    document.getElementById('beep').play();
  });
</script>

</body>
</html>
